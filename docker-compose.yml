services:
  db:
    image: informaticsmatters/rdkit-cartridge-debian:Release_2025_03_3
    environment:
      POSTGRES_USER: tckdb
      POSTGRES_PASSWORD: tckdb
      POSTGRES_DB: tckdb_dev
    ports:
      - 5432:5432
    network_mode: host
    volumes:
      - tckdb_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: tckdb
      MINIO_ROOT_PASSWORD: tckdb_secret
    volumes:
      - tckdb_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  tckdb_pgdata:
  tckdb_minio:
