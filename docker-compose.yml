services:
  db:
    image: informaticsmatters/rdkit-cartridge-debian:Release_2025_03_3
    environment:
      POSTGRES_USER: tckdb
      POSTGRES_PASSWORD: tckdb
      POSTGRES_DB: tckdb_dev
    ports:
      - 5432:5432
    network_mode: host
    volumes:
      - tckdb_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: tckdb
      MINIO_ROOT_PASSWORD: tckdb_secret
    volumes:
      - tckdb_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional standalone upload worker.
  # Activate with: docker compose --profile worker up
  #
  # Alternatively, set TCKDB_INLINE_WORKER=true on the api service to run
  # the worker inside the API process (simpler, but shares CPU).
  worker:
    profiles: ["worker"]
    image: tckdb-api  # build this image the same way as the API service
    command: >
      conda run -n tckdb_env python -m app.workers.upload_worker
    environment:
      DB_USER: tckdb
      DB_PASSWORD: tckdb
      DB_NAME: tckdb_dev
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      TCKDB_INLINE_WORKER: "false"
    network_mode: host
    depends_on:
      - db
    restart: unless-stopped

volumes:
  tckdb_pgdata:
  tckdb_minio:
